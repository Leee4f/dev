<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Path of Exile 2 - KEII-DEV</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+JP:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script type="module" src="./poe2.ts"></script>
</head>
<body class="m-0 p-8 bg-retro-bg font-sans text-retro-text flex justify-center opacity-0 transition-opacity duration-1000">

<div class="w-full max-w-3xl bg-retro-paper p-8 shadow-sm rounded-sm">
    <div id="nav"></div>

    <h1 class="text-2xl font-medium tracking-wide border-b-2 border-retro-accent inline-block mb-2 pb-1">
        PATH OF EXILE 2
    </h1>
    <div class="text-xs text-retro-muted mb-8 mt-1">
        <a href="/game/" class="text-retro-muted no-underline border-b border-dashed border-retro-muted hover:text-retro-accent hover:border-retro-accent transition-colors">&lt; BACK TO GAME</a>
    </div>

    <section class="mb-8">
        <h2 class="text-lg font-medium tracking-wide border-b border-retro-border inline-block mb-4 mt-4 pb-1">BUILDS</h2>
        <div id="builds-container"><p class="text-retro-muted text-sm italic py-4">Loading...</p></div>

        <a href="/game/poe2/skill-cards/"
           class="block mt-3 border border-retro-border rounded-sm px-4 py-3 text-sm no-underline transition-all hover:border-retro-accent hover:bg-retro-card-hover group">
            <span class="text-retro-accent font-mono text-xs tracking-wider">SKILL & SUPPORT CARDS</span>
            <span class="text-retro-muted text-xs ml-2">— ED Contagion Lich のスキル × サポート構成マップ</span>
            <span class="text-retro-accent ml-2 transition-transform inline-block group-hover:translate-x-1">&gt;</span>
        </a>
    </section>

    <section class="mb-8">
        <h2 class="text-lg font-medium tracking-wide border-b border-retro-border inline-block mb-4 mt-4 pb-1">GAMEPLAY NOTES</h2>
        <div id="notes-container"><p class="text-retro-muted text-sm italic py-4">Loading...</p></div>
    </section>

    <section class="mb-8">
        <h2 class="text-lg font-medium tracking-wide border-b border-retro-border inline-block mb-4 mt-4 pb-1">TIPS &amp; MECHANICS</h2>
        <div id="tips-container"><p class="text-retro-muted text-sm italic py-4">Loading...</p></div>
    </section>
</div>

</body>
</html>
