<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamer's Dev Log - Bujo Style</title>
    <style>
        /* --- 1. Base / Dot Grid Background --- */
        :root {
            --bg-color: #fcfcfc;
            --dot-color: #e0e0e0;
            --text-color: #333;
            --accent-color: #555;
            --ink-fade: rgba(85, 85, 85, 0.1);
        }

        body {
            margin: 0;
            padding: 2rem;
            background-color: var(--bg-color);
            /* CSS Radial Gradient for Dot Grid */
            background-image: radial-gradient(var(--dot-color) 1px, transparent 1px);
            background-size: 20px 20px;
            font-family: 'Courier New', Courier, monospace; /* Monospace for tech-minimal feel */
            color: var(--text-color);
            display: flex;
            justify-content: center;
            opacity: 0; /* JS will reveal */
            transition: opacity 1s ease-in-out;
        }

        .notebook-page {
            width: 100%;
            max-width: 800px;
            background: rgba(255, 255, 255, 0.8); /* Semi-transparent white to lift off dots */
            padding: 2rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); /* Soft shadow for notebook feel */
        }

        /* --- 2. Typography --- */
        h1, h2, h3 {
            font-weight: normal;
            letter-spacing: 0.1rem;
            border-bottom: 1px solid var(--accent-color);
            display: inline-block;
            margin-top: 0;
        }

        h1 { font-size: 1.5rem; margin-bottom: 2rem; }
        h2 { font-size: 1.2rem; margin-bottom: 1rem; margin-top: 1.5rem; }

        .subtitle {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 2rem;
        }

        /* --- 3. Layout (Flexbox) --- */
        .log-container {
            display: flex;
            gap: 2rem;
        }

        @media (max-width: 600px) {
            .log-container { flex-direction: column; }
        }

        /* --- 4. Projects --- */
        .projects-section {
            flex: 1;
        }

        .project-card {
            border: 1px solid var(--dot-color);
            padding: 1rem;
            margin-bottom: 1rem;
            transition: border-color 0.3s;
        }

        .project-card:hover {
            border-color: var(--accent-color);
        }

        .status {
            font-size: 0.7rem;
            color: #888;
        }

    </style>
</head>
<body>

<div class="notebook-page">
    <h1>GAMER'S DEV LOG &lt;BUJO_STYLE&gt;</h1>
    <p class="subtitle">Log: Dev Progress / Strategy</p>

    <div class="log-container">
        <div class="projects-section">
            <h2>PROJECTS &amp; STRATEGY</h2>

            <div class="project-card">
                <h3><a href="poe2/" style="color: inherit; text-decoration: none; border-bottom: 1px dashed var(--accent-color);">Path of Exile 2</a></h3>
                <p class="status">Type: Game Notes &amp; Builds</p>
                <ul>
                    <li>Build guides &amp; theory</li>
                    <li>Gameplay tips &amp; findings</li>
                </ul>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        document.body.style.opacity = 1;
    });
</script>

</body>
</html>
