<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Path of Exile 2 - Notes & Builds</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-color: #fcfcfc;
            --dot-color: #e0e0e0;
            --text-color: #333;
            --accent-color: #555;
            --ink-fade: rgba(85, 85, 85, 0.1);
        }

        body {
            margin: 0;
            padding: 2rem;
            background-color: var(--bg-color);
            background-image: radial-gradient(var(--dot-color) 1px, transparent 1px);
            background-size: 20px 20px;
            font-family: 'Courier New', Courier, monospace;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }

        .notebook-page {
            width: 100%;
            max-width: 800px;
            background: rgba(255, 255, 255, 0.8);
            padding: 2rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        h1, h2 {
            font-weight: normal;
            letter-spacing: 0.1rem;
            border-bottom: 1px solid var(--accent-color);
            display: inline-block;
            margin-top: 0;
        }

        h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        h2 { font-size: 1.2rem; margin-bottom: 1rem; margin-top: 1.5rem; }

        .breadcrumb {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 2rem;
        }

        .breadcrumb a {
            color: #888;
            text-decoration: none;
            border-bottom: 1px dashed #888;
        }

        .breadcrumb a:hover {
            color: var(--text-color);
        }

        .section {
            margin-bottom: 2rem;
        }

        /* Markdown card: collapsible container for each .md file */
        .md-card {
            border: 1px solid var(--dot-color);
            margin-bottom: 1rem;
            transition: border-color 0.3s;
        }

        .md-card:hover {
            border-color: var(--accent-color);
        }

        .md-card-title {
            padding: 0.8rem 1rem;
            cursor: pointer;
            font-size: 0.95rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .md-card-title::after {
            content: '>';
            color: var(--accent-color);
            transition: transform 0.3s;
        }

        .md-card.open .md-card-title::after {
            transform: rotate(90deg);
        }

        .md-card-body {
            height: 0;
            overflow: hidden;
            transition: height 0.4s ease-out;
        }

        .md-card-body-inner {
            padding: 0 1rem 1rem 1rem;
            font-size: 0.85rem;
            line-height: 1.6;
        }

        .md-card-body-inner h1,
        .md-card-body-inner h2,
        .md-card-body-inner h3 {
            font-weight: normal;
            letter-spacing: 0.05rem;
            border-bottom: none;
            display: block;
            font-size: 0.95rem;
            margin: 1rem 0 0.5rem 0;
        }

        .md-card-body-inner h1 { font-size: 1.05rem; }

        .md-card-body-inner ul {
            padding-left: 1.5rem;
        }

        .md-card-body-inner li {
            margin-bottom: 0.3rem;
        }

        .md-card-body-inner strong {
            color: #000;
        }

        .md-card-body-inner code {
            background: var(--ink-fade);
            padding: 0.1rem 0.3rem;
            font-size: 0.8rem;
        }

        .empty-note {
            color: #aaa;
            font-size: 0.85rem;
            font-style: italic;
            padding: 1rem 0;
        }
    </style>
</head>
<body>

<div class="notebook-page">
    <h1>PATH OF EXILE 2</h1>
    <div class="breadcrumb"><a href="../">&lt; BACK TO LOG</a></div>

    <div class="section">
        <h2>BUILDS</h2>
        <div id="builds-container">
            <p class="empty-note">Loading...</p>
        </div>
    </div>

    <div class="section">
        <h2>GAMEPLAY NOTES</h2>
        <div id="notes-container">
            <p class="empty-note">Loading...</p>
        </div>
    </div>

    <div class="section">
        <h2>TIPS &amp; MECHANICS</h2>
        <div id="tips-container">
            <p class="empty-note">Loading...</p>
        </div>
    </div>
</div>

<script>
    // Fetch content.json and render each section
    async function loadContent() {
        try {
            const res = await fetch('content.json');
            const content = await res.json();

            await Promise.all([
                renderSection('builds', content.builds, 'builds-container'),
                renderSection('notes', content.notes, 'notes-container'),
                renderSection('tips', content.tips, 'tips-container')
            ]);
        } catch (e) {
            console.error('Failed to load content.json:', e);
        }

        document.body.style.opacity = 1;
    }

    async function renderSection(dir, files, containerId) {
        const container = document.getElementById(containerId);

        if (!files || files.length === 0) {
            container.innerHTML = '<p class="empty-note">-- no entries yet --</p>';
            return;
        }

        container.innerHTML = '';

        for (const file of files) {
            try {
                const res = await fetch(dir + '/' + file);
                if (!res.ok) continue;
                const md = await res.text();
                const html = marked.parse(md);

                // Extract first heading as card title
                const titleMatch = md.match(/^#\s+(.+)$/m);
                const title = titleMatch ? titleMatch[1] : file.replace('.md', '');

                const card = document.createElement('div');
                card.className = 'md-card';
                card.innerHTML =
                    '<div class="md-card-title">' + title + '</div>' +
                    '<div class="md-card-body"><div class="md-card-body-inner">' + html + '</div></div>';

                card.querySelector('.md-card-title').addEventListener('click', function() {
                    const body = card.querySelector('.md-card-body');
                    const inner = body.querySelector('.md-card-body-inner');

                    if (card.classList.contains('open')) {
                        body.style.height = inner.offsetHeight + 'px';
                        requestAnimationFrame(function() {
                            body.style.height = '0';
                        });
                        card.classList.remove('open');
                    } else {
                        body.style.height = inner.offsetHeight + 'px';
                        card.classList.add('open');
                        body.addEventListener('transitionend', function handler() {
                            if (card.classList.contains('open')) {
                                body.style.height = 'auto';
                            }
                            body.removeEventListener('transitionend', handler);
                        });
                    }
                });

                container.appendChild(card);
            } catch (e) {
                console.error('Failed to load ' + dir + '/' + file, e);
            }
        }
    }

    document.addEventListener('DOMContentLoaded', loadContent);
</script>

</body>
</html>
